name: Build, Push to ECR, and Terraform CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform-ci:
    name: "Terraform Validate & Plan"
    runs-on: ubuntu-latest
    
    # Optional: If your terraform files are in a specific subfolder, uncomment below:
     defaults:
       run:
         working-directory: ./ecs-terraform

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup HashiCorp Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0 # Match your local Terraform version

    - name: Check Terraform Format
      id: fmt
      run: terraform fmt -check
      # This fails the workflow if your code isn't cleanly formatted via 'terraform fmt'

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Terraform Init
      id: init
      run: terraform init

    - name: Terraform Validate
      id: validate
      run: terraform validate
      # Checks for structural errors, missing variables, or incorrect argument types

    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color
      # Generates the execution plan showing exactly what will be added, changed, or destroyed
      env:
        TF_VAR_image_tag: ${{ github.sha }} # Example of passing dynamic variables if needed

  build:
    name: "Build and Push App"
    runs-on: ubuntu-latest
    needs: terraform-ci # Optional: Only build the app if Terraform validation passes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only deploy on true merges to main

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker image
      id: build-image
      run: |
        docker build -t ${{ secrets.ECR_REPOSITORY }}/myapp:${{ github.sha }} .
        docker tag ${{ secrets.ECR_REPOSITORY }}/myapp:${{ github.sha }} ${{ secrets.ECR_REPOSITORY }}/myapp:latest
        docker push ${{ secrets.ECR_REPOSITORY }}/myapp:${{ github.sha }}
        docker push ${{ secrets.ECR_REPOSITORY }}/myapp:latest
        echo "image=${{ secrets.ECR_REPOSITORY }}/myapp:${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Download task definition
      run: |
        aws ecs describe-task-definition --task-definition myapp-task --query taskDefinition > task-definition.json    
        
    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
         task-definition: task-definition.json
         container-name: myapp
         image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
         task-definition: ${{ steps.task-def.outputs.task-definition }}
         service: myapp-task-service
         cluster: myapp-cluster
         wait-for-service-stability: true
